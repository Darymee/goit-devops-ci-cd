replicaCount: 2

image:
  repository: '123456789012.dkr.ecr.us-west-2.amazonaws.com/lesson-7-django'
  tag: 'latest'
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

containerPort: 8000

config:
  POSTGRES_HOST: 'db'
  POSTGRES_PORT: '5432'
  POSTGRES_USER: 'django_user'
  POSTGRES_DB: 'django_db'
  POSTGRES_PASSWORD: 'pass9764gd'
  DJANGO_ALLOWED_HOSTS: '*'
  DJANGO_DEBUG: 'False'

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  className: nginx
  host: yourdomain.com
  path: /
  pathType: Prefix
  tls: false
  clusterIssuer: letsencrypt-prod
